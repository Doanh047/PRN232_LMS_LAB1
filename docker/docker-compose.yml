services:

  # ── SQL Server Database ────────────────────────────────────────────────────
  db:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: lms_db
    environment:
      SA_PASSWORD: "Admin@1234567890"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1434:1433"
    volumes:
      - lms_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Admin@1234567890' -C -Q 'SELECT 1' || exit 1"
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Init job: run SQL script once DB is healthy ───────────────────────────
  # Reuses the SQL Server image which already contains sqlcmd at /opt/mssql-tools/bin/
  db-init:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: lms_db_init
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../database/init.sql:/init.sql:ro
    entrypoint: /bin/bash
    command: >
      -c "
        /opt/mssql-tools18/bin/sqlcmd -S db,1433 -U sa -P Admin@1234567890 -C -i /init.sql &&
        echo 'DB initialised successfully.'
      "
    restart: "no"

  # ── ASP.NET Core API ──────────────────────────────────────────────────────
  api:
    build:
      context: ../LAB1_LMS
      dockerfile: Dockerfile
    container_name: lms_api
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=LMS_DB;User Id=sa;Password=Admin@1234567890;TrustServerCertificate=True;MultipleActiveResultSets=True;"
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

volumes:
  lms_data:
